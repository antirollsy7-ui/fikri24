<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minik Fikrinin Dünyası</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            background-color: #000;
            font-family: 'Teko', sans-serif;
            color: #fff;
            position: relative;
        }

        #portrait-warning {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: #0d0e15;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .phone-icon {
            width: 60px; height: 100px;
            border: 4px solid #ff3e3e;
            border-radius: 10px; margin-bottom: 20px;
            position: relative;
            animation: rotatePhone 2s ease-in-out infinite;
        }

        .phone-icon::after {
            content: ''; position: absolute;
            bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px;
            border: 2px solid #ff3e3e; border-radius: 50%;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #portrait-warning h2 { font-size: 24px; color: #ffcc00; margin-bottom: 12px; }
        #portrait-warning p { font-size: 16px; color: #888; }

        #game-container {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            background-color: #3498db;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none; 
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 10;
        }

        .btn-group {
            display: flex; gap: 20px; pointer-events: auto;
        }

        .control-btn {
            width: 75px; height: 75px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: bold;
            color: rgba(255,255,255,0.8);
            touch-action: manipulation;
            box-shadow: 0 4px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }

        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(0.92);
        }

        @media (orientation: landscape) {
            #portrait-warning { display: none; }
            #game-container { display: block; }
        }
    </style>
</head>
<body>

    <div id="portrait-warning">
        <div class="phone-icon"></div>
        <h2>MİNİK FİKRİNİN DÜNYASI</h2>
        <p>Oyunu tam ekranda oynamak için cihazı yatay çevirin.</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <div class="btn-group">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="btn-group">
                <div class="control-btn" id="btn-attack" style="border-color: #e74c3c; color: #e74c3c;">A</div>
                <div class="control-btn" id="btn-jump" style="border-color: #3498db; color: #3498db;">B</div>
            </div>
        </div>
    </div>

    <script>
        // --- POLYFILL roundRect (bazı tarayıcılar için) ---
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // Tarayıcıyı Tam Ekrana Zorlama Fonksiyonu
        function requestFullScreen() {
            let doc = window.document;
            let docEl = doc.documentElement;
            let requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if(requestFullScreen) {
                requestFullScreen.call(docEl).catch(err => {
                    console.log("Tam ekran reddedildi: ", err);
                });
            }
        }

        // --- BASİT SES MOTORU ---
        class RetroAudio {
            constructor() { this.ctx = null; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            play(type) {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                
                if (type === 'jump') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                } else if (type === 'punch') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(80, this.ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.08);
                } else if (type === 'hit') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.15);
                } else if (type === 'coin') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(1300, this.ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.2);
                }
            }
        }
        const sound = new RetroAudio();

        // --- OYUN PARAMETRELERİ ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'menu'; 
        let keys = { left: false, right: false };
        let touchKeys = { left: false, right: false };
        let camera = { x: 0, y: 0 };
        let screenShake = 0;

        let particles = [];
        let enemies = [];
        let coins = [];
        let raindrops = [];

        const GRAVITY = 0.65;
        let groundY = 0; 
        const platforms = [];

        // Dinamik Ekran Ayarlama
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height * 0.85; 
            platforms.length = 0;
            platforms.push(
                { x: -1000, y: groundY, width: 5000, height: canvas.height }
            );
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let menuPlayBtn = { x: 0, y: 0, w: 280, h: 60 };
        let cutsceneTimer = 0;
        let cutsceneStage = 0;
        let cutsceneActors = { danX: -100, josieX: canvas.width/2, soldierX: canvas.width + 100, text: "" };

        // --- ÇİZİM YARDIMCILARI ---
        function drawVectorLimb(ctx, x1, y1, x2, y2, color, thickness) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            ctx.stroke();
        }

        // ---- YENİ ÇİZGİ ROMAN PANELLİ CUTSCENE ----
        function drawComicPanel(stage) {
            // Arka plan – 2.5D perspektifli dağlar
            ctx.save();
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a2a6c');
            grad.addColorStop(0.5, '#b21f1f');
            grad.addColorStop(1, '#fdbb2d');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#2d3436';
            ctx.fillRect(0, groundY - 20, canvas.width, 40);

            ctx.fillStyle = '#636e72';
            for (let i = -2; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 300 - 100, groundY);
                ctx.lineTo(i * 300 + 100, groundY - 250 - i * 20);
                ctx.lineTo(i * 300 + 300, groundY);
                ctx.fill();
            }

            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#2ecc71';
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.fillRect(i, groundY, 3, 15);
            }

            // Dan
            let danX = canvas.width * 0.3;
            let danY = groundY - 60;
            ctx.save();
            ctx.translate(danX, danY);
            ctx.fillStyle = '#e84118';
            ctx.fillRect(-18, -10, 36, 8);
            ctx.fillRect(-20, -6, 6, 10);
            ctx.fillRect(14, -6, 6, 10);
            ctx.fillStyle = '#fbc531';
            ctx.beginPath();
            ctx.arc(0, 0, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillRect(4, -3, 4, 4);
            ctx.fillRect(-8, -3, 4, 4);
            ctx.fillStyle = '#273c75';
            ctx.beginPath();
            ctx.roundRect(-12, 14, 24, 30, 5);
            ctx.fill();
            drawVectorLimb(ctx, -6, 40, -6, 65, '#2f3640', 8);
            drawVectorLimb(ctx, 6, 40, 6, 65, '#2f3640', 8);
            ctx.restore();

            // Josie
            let josieX = canvas.width * 0.7;
            let josieY = groundY - 55;
            ctx.save();
            ctx.translate(josieX, josieY);
            ctx.scale(-1, 1);
            ctx.fillStyle = '#ff9ff3';
            ctx.beginPath();
            ctx.moveTo(0, 10);
            ctx.lineTo(-18, 45);
            ctx.lineTo(18, 45);
            ctx.fill();
            ctx.fillStyle = '#ffe0bd';
            ctx.beginPath();
            ctx.arc(0, -5, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#e1b12c';
            ctx.beginPath();
            ctx.arc(0, -12, 16, Math.PI, 0);
            ctx.fill();
            ctx.restore();

            // Asker
            let soldierX = canvas.width * 0.5;
            let soldierY = groundY - 60;
            ctx.save();
            ctx.translate(soldierX, soldierY);
            ctx.scale(-1, 1);
            ctx.fillStyle = '#c23616';
            ctx.beginPath();
            ctx.arc(0, -2, 15, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle = '#fbc531';
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#4cd137';
            ctx.beginPath();
            ctx.roundRect(-10, 12, 20, 28, 5);
            ctx.fill();
            ctx.fillStyle = '#7f8fa6';
            ctx.fillRect(10, 20, 30, 6);
            ctx.restore();

            // Altyazı bandı
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            let bubbleText = '';
            let isThought = false;
            if (stage === 0) {
                bubbleText = 'Huzur... Sonunda...';
            } else if (stage === 1) {
                bubbleText = 'Kraliyet emri! Direnişçiler yok edilecek!';
            } else if (stage === 2) {
                bubbleText = 'Josie... Lütfen...';
            } else if (stage === 3) {
                bubbleText = 'Fikri o günden sonra bir yemin etti...';
                isThought = true;
            } else if (stage === 4) {
                bubbleText = 'Ne pahasına olursa olsun, kimseden korkmayacaktı!';
                isThought = true;
            } else if (stage === 5) {
                bubbleText = 'Artık hazırım.';
            }

            // Balon
            ctx.save();
            let bx = canvas.width / 2 - 150;
            let by = canvas.height - 180;
            let bw = 300;
            let bh = 60;
            ctx.fillStyle = isThought ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.95)';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.roundRect(bx, by, bw, bh, 20);
            ctx.fill();
            ctx.shadowBlur = 0;
            if (isThought) {
                ctx.beginPath();
                ctx.arc(bx + 30, by + bh, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx + 18, by + bh + 12, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx + 10, by + bh + 22, 4, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(bx + 40, by + bh);
                ctx.lineTo(bx + 30, by + bh + 15);
                ctx.lineTo(bx + 20, by + bh);
                ctx.fill();
            }
            ctx.fillStyle = '#000';
            ctx.font = 'bold 22px Teko';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(bubbleText, canvas.width / 2, by + bh / 2 + 5);
            ctx.restore();

            // Sayfa numarası
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '18px Teko';
            ctx.textAlign = 'right';
            ctx.fillText(`Sayfa ${stage+1}/6`, canvas.width - 30, canvas.height - 30);

            ctx.restore();
        }

        // Cutscene ana döngüsü
        function runCutscene() {
            cutsceneTimer++;

            let duration = 180; // 3 saniye
            if (cutsceneStage === 0 && cutsceneTimer > duration) { cutsceneStage = 1; cutsceneTimer = 0; }
            else if (cutsceneStage === 1 && cutsceneTimer > duration) { cutsceneStage = 2; cutsceneTimer = 0; }
            else if (cutsceneStage === 2 && cutsceneTimer > duration) { cutsceneStage = 3; cutsceneTimer = 0; }
            else if (cutsceneStage === 3 && cutsceneTimer > duration) { cutsceneStage = 4; cutsceneTimer = 0; }
            else if (cutsceneStage === 4 && cutsceneTimer > duration) { cutsceneStage = 5; cutsceneTimer = 0; }
            else if (cutsceneStage === 5 && cutsceneTimer > duration) {
                gameState = 'playing';
                document.getElementById('controls').style.display = 'flex';
                initLevel();
                return;
            }

            // Zoom efektleri
            let zoom = 1;
            let focusX = canvas.width/2;
            let focusY = groundY - 80;
            if (cutsceneStage === 2) {
                zoom = 1.8;
                focusX = canvas.width * 0.3;
                focusY = groundY - 60;
            } else if (cutsceneStage === 3 || cutsceneStage === 4) {
                zoom = 2.2;
                focusX = canvas.width * 0.3;
                focusY = groundY - 60;
            } else if (cutsceneStage === 5) {
                zoom = 1.5;
                focusX = canvas.width * 0.3;
                focusY = groundY - 60;
            }

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(zoom, zoom);
            ctx.translate(-focusX, -focusY);

            drawComicPanel(cutsceneStage);

            ctx.restore();

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, 20);
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        }

        // --- OYUNCU (DAN) SINIFI ---
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = 30; this.height = 60;
                this.vx = 0; this.vy = 0;
                this.speed = 5.5; this.jumpForce = -14;
                this.grounded = false; this.doubleJumpAvailable = true;
                this.facing = 1; 
                this.health = 100; this.maxHealth = 100;
                this.coins = 0;
                this.state = 'idle'; 
                this.animTimer = 0; this.stateTimer = 0;
                this.isInvincible = 0;
            }

            update() {
                let moveDir = 0;
                if (keys.left || touchKeys.left) moveDir = -1;
                else if (keys.right || touchKeys.right) moveDir = 1;

                if (this.isInvincible > 0) this.isInvincible--;

                if (!['punch1', 'punch2', 'kick', 'hurt'].includes(this.state)) {
                    this.vx = moveDir * this.speed;
                    if (moveDir !== 0) {
                        this.facing = moveDir;
                        this.state = 'running';
                    } else {
                        this.state = 'idle';
                    }
                } else {
                    this.vx *= 0.8;
                }

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                this.grounded = false;
                for (let plat of platforms) {
                    if (this.x + this.width/2 > plat.x && this.x - this.width/2 < plat.x + plat.width) {
                        if (this.y + this.height >= plat.y && this.y + this.height - this.vy <= plat.y + 15 && this.vy >= 0) {
                            this.y = plat.y - this.height;
                            this.vy = 0;
                            this.grounded = true;
                            this.doubleJumpAvailable = true;
                        }
                    }
                }

                if (!this.grounded && !['punch1', 'punch2', 'kick', 'hurt'].includes(this.state)) {
                    this.state = this.vy < 0 ? 'jumping' : 'falling';
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) this.state = 'idle';
                }
                this.animTimer += 0.2;
            }

            jump() {
                if (this.state === 'hurt' || gameState !== 'playing') return;
                if (this.grounded) {
                    this.vy = this.jumpForce; this.grounded = false;
                    sound.play('jump'); spawnSmoke(this.x, this.y + this.height);
                } else if (this.doubleJumpAvailable) {
                    this.vy = this.jumpForce * 0.9; this.doubleJumpAvailable = false;
                    sound.play('jump'); spawnSmoke(this.x, this.y + this.height/2, '#52b3ff');
                }
            }

            attack() {
                if (this.state === 'hurt' || gameState !== 'playing') return;
                sound.play('punch');
                if (this.state !== 'punch1' && this.state !== 'punch2' && this.state !== 'kick') {
                    this.state = 'punch1'; this.stateTimer = 12; this.executeHitbox(40, 15);
                } else if (this.state === 'punch1' && this.stateTimer < 8) {
                    this.state = 'punch2'; this.stateTimer = 12; this.executeHitbox(45, 20);
                } else if (this.state === 'punch2' && this.stateTimer < 8) {
                    this.state = 'kick'; this.stateTimer = 16; this.executeHitbox(55, 30);
                }
            }

            executeHitbox(range, damage) {
                let hitX = this.facing === 1 ? this.x + this.width/2 : this.x - this.width/2 - range;
                let hitY = this.y + 15;

                enemies.forEach(enemy => {
                    if (enemy.health > 0 && hitX + range > enemy.x - enemy.width/2 && hitX < enemy.x + enemy.width/2 && hitY + 30 > enemy.y && hitY < enemy.y + enemy.height) {
                        enemy.takeDamage(damage, this.facing);
                        screenShake = 12;
                    }
                });
            }

            takeDamage(damage, dir) {
                if (this.isInvincible > 0) return;
                this.health -= damage;
                this.state = 'hurt'; this.stateTimer = 20;
                this.vy = -4; this.vx = dir * 5;
                this.isInvincible = 50;
                sound.play('hit');
                spawnDamageText(this.x, this.y - 15, `-${damage}`, '#ff3e3e');

                if (this.health <= 0) {
                    this.health = 0;
                    setTimeout(() => { this.health = 100; this.x = 100; this.y = groundY - 100; }, 1500);
                }
            }

            draw(c = ctx) {
                if (this.isInvincible % 6 > 3) return;

                c.save();
                c.translate(this.x, this.y);
                if (this.facing === -1) c.scale(-1, 1);

                let skin = '#fbc531';
                let shirt = '#273c75';
                let pants = '#2f3640';
                
                let swing = Math.sin(this.animTimer) * 15;
                let leg1 = 0, leg2 = 0, arm1 = 0, arm2 = 0;
                
                if (this.state === 'running') {
                    leg1 = swing; leg2 = -swing;
                    arm1 = -swing; arm2 = swing;
                } else if (this.state === 'jumping' || this.state === 'falling') {
                    leg1 = -10; leg2 = 10;
                    arm1 = -20; arm2 = 20;
                }

                drawVectorLimb(c, 0, 30, leg2, 55, pants, 10);
                if (this.state === 'punch1') {
                    drawVectorLimb(c, 0, 15, 20, 15, shirt, 8);
                } else if (this.state === 'punch2') {
                    drawVectorLimb(c, 0, 15, 30, 5, shirt, 8);
                } else {
                    drawVectorLimb(c, 0, 15, arm2, 35, shirt, 8);
                }

                c.fillStyle = shirt;
                c.beginPath(); c.roundRect(-10, 10, 20, 25, 5); c.fill();
                c.fillStyle = '#f1c40f';
                c.fillRect(-11, 30, 22, 5);

                c.fillStyle = skin;
                c.beginPath(); c.arc(0, 0, 14, 0, Math.PI*2); c.fill();
                c.fillStyle = '#000'; c.fillRect(4, -3, 3, 3);
                c.fillStyle = '#e84118'; c.fillRect(-14, -8, 28, 6);
                c.beginPath(); c.moveTo(-14, -8); c.lineTo(-25, -2); c.lineTo(-14, -2); c.fill();

                if (this.state === 'kick') {
                    drawVectorLimb(c, 0, 30, 35, 20, pants, 10);
                } else {
                    drawVectorLimb(c, 0, 30, leg1, 55, pants, 10);
                }

                if (this.state === 'punch2') {
                    drawVectorLimb(c, 0, 15, 25, 15, shirt, 8);
                } else if (this.state !== 'punch1' && this.state !== 'kick') {
                    drawVectorLimb(c, 0, 15, arm1, 35, shirt, 8);
                }

                c.restore();
            }
        }

        const player = new Player(100, 200);

        // --- ASKER SINIFI ---
        class Soldier {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.width = 30; this.height = 60;
                this.vx = -1.5; this.vy = 0;
                this.health = 50; this.maxHealth = 50;
                this.facing = -1;
                this.state = 'patrol'; this.stateTimer = 0;
                this.startX = x; this.animTimer = Math.random() * 10;
            }

            update() {
                if (this.state === 'dead') return;
                this.vy += GRAVITY; this.y += this.vy;

                platforms.forEach(plat => {
                    if (this.x + this.width/2 > plat.x && this.x - this.width/2 < plat.x + plat.width) {
                        if (this.y + this.height >= plat.y && this.y + this.height - this.vy <= plat.y + 15 && this.vy >= 0) {
                            this.y = plat.y - this.height; this.vy = 0;
                        }
                    }
                });

                let dist = Math.abs(player.x - this.x);
                if (this.state === 'hurt') {
                    this.vx *= 0.8; this.stateTimer--;
                    if (this.stateTimer <= 0) this.state = 'patrol';
                } else if (dist < 200 && Math.abs(player.y - this.y) < 80) {
                    this.state = 'chase';
                    this.facing = player.x > this.x ? 1 : -1;
                    this.vx = this.facing * 2.5;

                    if (dist < 50 && Math.random() < 0.05) {
                        this.state = 'attack'; this.vx = 0;
                        player.takeDamage(10, this.facing);
                        sound.play('hit');
                    }
                } else {
                    this.state = 'patrol';
                    if (this.x > this.startX + 100) { this.facing = -1; this.vx = -1.5; }
                    else if (this.x < this.startX - 100) { this.facing = 1; this.vx = 1.5; }
                }
                this.x += this.vx;
                this.animTimer += 0.2;
            }

            takeDamage(damage, dir) {
                this.health -= damage; this.state = 'hurt'; this.stateTimer = 15;
                this.vx = dir * 4.5;
                sound.play('hit');
                spawnDamageText(this.x, this.y - 20, `-${damage}`, '#f39c12');

                if (this.health <= 0) {
                    this.state = 'dead';
                    for (let i = 0; i < 3; i++) coins.push(new Coin(this.x, this.y + 20));
                }
            }

            draw() {
                if (this.state === 'dead') return;
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.facing === -1) ctx.scale(-1, 1);

                let swing = Math.sin(this.animTimer) * 10;
                let leg1 = 0, leg2 = 0;
                if (this.vx !== 0) { leg1 = swing; leg2 = -swing; }

                let vest = '#4cd137'; let uniform = '#2f3640'; let skin = '#fbc531';

                drawVectorLimb(ctx, 0, 30, leg2, 55, uniform, 10);
                drawVectorLimb(ctx, 0, 30, leg1, 55, uniform, 10);
                ctx.fillStyle = vest; ctx.beginPath(); ctx.roundRect(-10, 10, 20, 25, 5); ctx.fill();
                drawVectorLimb(ctx, -5, 15, 15, 25, uniform, 8);
                ctx.fillStyle = '#7f8fa6'; ctx.fillRect(5, 20, 25, 6);
                drawVectorLimb(ctx, 5, 15, 25, 22, uniform, 8);

                ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#c23616'; ctx.beginPath(); ctx.arc(0, -2, 13, Math.PI, 0); ctx.fill();

                ctx.fillStyle = '#000'; ctx.fillRect(-15, -25, 30, 4);
                ctx.fillStyle = '#e84118'; ctx.fillRect(-15, -25, (this.health / this.maxHealth) * 30, 4);

                ctx.restore();
            }
        }

        // --- ALTIN (COIN) ---
        class Coin {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 6; this.vy = -Math.random() * 5 - 3;
                this.radius = 8; this.collected = false;
            }
            update() {
                if (this.collected) return;
                this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;
                if (this.y + this.radius >= groundY) {
                    this.y = groundY - this.radius; this.vy = -this.vy * 0.5; this.vx *= 0.6;
                }
                let dx = player.x - this.x; let dy = (player.y + player.height/2) - this.y;
                if (Math.sqrt(dx*dx + dy*dy) < 35) {
                    this.collected = true; player.coins++; sound.play('coin');
                }
            }
            draw() {
                if (this.collected) return;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = '#f1c40f'; ctx.fill();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        // --- PARTİKÜLLER ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*3; this.vy = (Math.random()-0.5)*3;
                this.color = color; this.size = Math.random()*5+3; this.life = 20;
            }
            update() { this.x+=this.vx; this.y+=this.vy; this.life--; }
            draw() { ctx.fillStyle = this.color; ctx.globalAlpha = this.life/20; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.vy = -2; this.life = 40;
            }
            update() { this.y+=this.vy; this.life--; }
            draw() { ctx.font = '20px Teko'; ctx.fillStyle = this.color; ctx.fillText(this.text, this.x, this.y); }
        }

        function spawnSmoke(x, y, color = '#fff') { for (let i = 0; i < 5; i++) particles.push(new Particle(x, y, color)); }
        function spawnDamageText(x, y, text, color) { particles.push(new FloatingText(x, y, text, color)); }

        function initLevel() {
            enemies = [
                new Soldier(600, groundY - 60),
                new Soldier(1000, groundY - 60),
                new Soldier(1500, groundY - 60)
            ];
            coins = []; particles = [];
        }

        // --- MENÜ ---
        function drawMenu() {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 50px Teko'; ctx.textAlign = 'center';
            ctx.fillText("MİNİK FİKRİNİN DÜNYASI", canvas.width / 2, canvas.height / 3);

            menuPlayBtn.x = canvas.width / 2 - menuPlayBtn.w / 2;
            menuPlayBtn.y = canvas.height / 2 + 20;
            
            ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.roundRect(menuPlayBtn.x, menuPlayBtn.y, menuPlayBtn.w, menuPlayBtn.h, 10); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = '30px Teko';
            ctx.fillText("HİKAYEYE BAŞLA", canvas.width / 2, menuPlayBtn.y + 40);
        }

        // --- OYUN GÜNCELLEME VE RENDER ---
        function updateGame() {
            if (screenShake > 0) screenShake--;
            player.update();

            camera.x += (player.x - canvas.width / 3 - camera.x) * 0.1;
            let targetY = player.y - canvas.height * 0.6;
            camera.y += (targetY - camera.y) * 0.1;
            let maxCamY = groundY - canvas.height + 50; 
            if (camera.y > maxCamY) camera.y = maxCamY;

            enemies.forEach(e => e.update());
            coins.forEach(c => c.update());
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
        }

        function renderGame() {
            ctx.save();
            if (screenShake > 0) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#5dade2';
            for (let i = -5; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 400 - camera.x * 0.3, canvas.height);
                ctx.lineTo(i * 400 + 200 - camera.x * 0.3, canvas.height - 400);
                ctx.lineTo(i * 400 + 400 - camera.x * 0.3, canvas.height);
                ctx.fill();
            }

            ctx.translate(-camera.x, -camera.y);

            ctx.fillStyle = '#27ae60';
            ctx.fillRect(-1000, groundY, 5000, 20);
            ctx.fillStyle = '#8e44ad';
            ctx.fillRect(-1000, groundY + 20, 5000, canvas.height);

            coins.forEach(c => c.draw());
            enemies.forEach(e => e.draw());
            player.draw();
            particles.forEach(p => p.draw());

            ctx.restore();

            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(15, 15, 200, 30);
            ctx.fillStyle = '#c0392b'; ctx.fillRect(20, 20, 190, 20);
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(20, 20, (player.health / player.maxHealth) * 190, 20);
            ctx.fillStyle = '#fff'; ctx.font = '22px Teko'; ctx.textAlign = 'left';
            ctx.fillText("HP", 25, 37);
            ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(240, 30, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillText(`x${player.coins}`, 255, 38);
        }

        // --- ANA DÖNGÜ ---
        function loop() {
            if (gameState === 'menu') drawMenu();
            else if (gameState === 'cutscene') runCutscene();
            else if (gameState === 'playing') { updateGame(); renderGame(); }
            requestAnimationFrame(loop);
        }
        loop();

        // --- KONTROLLER (DÜZELTİLDİ) ---
        // Canvas click'ini kaldırıp document'e ekliyoruz, böylece tıklama her zaman çalışır.
        document.addEventListener('click', function(e) {
            if (gameState !== 'menu') return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            if (clickX >= menuPlayBtn.x && clickX <= menuPlayBtn.x + menuPlayBtn.w &&
                clickY >= menuPlayBtn.y && clickY <= menuPlayBtn.y + menuPlayBtn.h) {
                try {
                    requestFullScreen();
                    sound.init();
                } catch(err) {
                    console.log("Başlatma hatası:", err);
                }
                gameState = 'cutscene';
                cutsceneTimer = 0;
                cutsceneStage = 0;
            }
        });

        // --- MOBİL DOKUNMATİK KONTROLLER ---
        const setupTouchBtn = (id, startAct, endAct) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startAct(); });
            if (endAct) btn.addEventListener('touchend', (e) => { e.preventDefault(); endAct(); });
        };

        setupTouchBtn('btn-left', () => touchKeys.left = true, () => touchKeys.left = false);
        setupTouchBtn('btn-right', () => touchKeys.right = true, () => touchKeys.right = false);
        setupTouchBtn('btn-jump', () => player.jump());
        setupTouchBtn('btn-attack', () => player.attack());

        // Klavye desteği (isteğe bağlı)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'z' || e.key === 'Z') player.jump();
            if (e.key === 'x' || e.key === 'X') player.attack();
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
        });
    </script>
</body>
